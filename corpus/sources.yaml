# Eggless baking corpus — add URLs here, scrape with scripts/scrape_corpus.py
#
# Usage:
#   python scripts/scrape_corpus.py --limit 15
#   python scripts/scrape_corpus.py --limit 50 --config corpus/sources.yaml

settings:
  output_dir: corpus/raw
  delay_seconds: 2.0        # pause between requests (be polite)
  skip_existing: true       # don't re-download files already on disk
  format: markdown          # markdown | text

